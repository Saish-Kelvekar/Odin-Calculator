<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1 class="heading">Basic Calculator</h1>
    </div>
    <div class="content">
        <div class="calc">
            <div class="calc-display">
                <div class="p"></div>
            </div>
            <div class="calc-buttons">
                <div class="calc-row">
                    <button data-type="clear" class="calc-button">AC</button>
                    <button data-type="operator" class="calc-button">&#8730</button>
                    <button data-type="operator" class="calc-button">%</button>
                    <button data-type="backspace" class="calc-button">⌫</button>
                </div>
                 <div class="calc-row">
                    <button data-type="number" class="calc-button">7</button>
                    <button data-type="number" class="calc-button">8</button>
                    <button data-type="number" class="calc-button">9</button>
                    <button data-type="operator" class="calc-button">+</button>
                </div>
                 <div class="calc-row">
                    <button data-type="number" class="calc-button">4</button>
                    <button data-type="number" class="calc-button">5</button>
                    <button data-type="number" class="calc-button">6</button>
                    <button data-type="operator" class="calc-button">-</button>
                </div>
                 <div class="calc-row">
                    <button data-type="number" class="calc-button">1</button>
                    <button data-type="number" class="calc-button">2</button>
                    <button data-type="number" class="calc-button">3</button>
                    <button data-type="operator" class="calc-button">&times;</button>
                </div>
                 <div class="calc-row">
                    <button data-type="number" class="calc-button">0</button>
                    <button data-type="decimal" class="calc-button">.</button>
                    <button data-type="equals" class="calc-button">=</button>
                    <button data-type="operator" class="calc-button">&divide;</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>Made by <a href="https://github.com/Saish-Kelvekar" target="_blank">Saish Kelvekar</a></p>
    </div>
</body>
</html>
